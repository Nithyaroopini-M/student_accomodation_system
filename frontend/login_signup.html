<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 380px;
            max-width: 90%;
            padding: 30px 25px;
            transition: 0.3s ease;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative; /* For the toggle button positioning */
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
        }

        input[type="text"],
        input[type="password"] {
            width: calc(100% - 30px); /* Adjust width for the toggle button */
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            background: #f9f9f9;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #5c6bc0;
            outline: none;
            background: #fff;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #777;
            font-size: 16px; /* Adjust icon size */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #5c6bc0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4b5aa7;
        }

        .link {
            margin-top: 15px;
            text-align: center;
            color: #5c6bc0;
            cursor: pointer;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }

        .message {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="form-title">Login</h2>

        <div id="login" class="tab-content">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="loginUsername" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" required placeholder="Enter your password">
                    <span class="toggle-password" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <button type="submit">Login</button>
            </form>
            <div id="login-message" class="message"></div>
            <div class="link" onclick="toggleForms('signup')">Don't have an account? Sign up</div>
        </div>

        <div id="signup" class="tab-content" style="display: none;">
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" name="signupUsername" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="signupPassword" required placeholder="Create a password">
                    <span class="toggle-password" onclick="togglePassword('signupPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <button type="submit">Sign Up</button>
            </form>
            <div id="signup-message" class="message"></div>
            <div class="link" onclick="toggleForms('login')">Already have an account? Login</div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginContent = document.getElementById('login');
        const signupContent = document.getElementById('signup');
        const signupMessage = document.getElementById('signup-message');
        const loginMessage = document.getElementById('login-message');
        const formTitle = document.getElementById('form-title');

        function toggleForms(form) {
            if (form === 'signup') {
                loginContent.style.display = 'none';
                signupContent.style.display = 'block';
                formTitle.textContent = 'Sign Up';
            } else {
                signupContent.style.display = 'none';
                loginContent.style.display = 'block';
                formTitle.textContent = 'Login';
            }
        }

        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const toggleButton = passwordInput.nextElementSibling;
            const eyeIcon = toggleButton.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function isValidPassword(password) {
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[^\w\s]/.test(password); // Matches any non-word character (excluding underscore) and non-whitespace

            return password.length >= 8 && hasLower && hasUpper && hasDigit && hasSpecial;
        }

        signupForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;

            if (!isValidPassword(password)) {
                signupMessage.textContent = 'Password must be at least 8 characters and include uppercase, lowercase, number, and special character.';
                signupMessage.className = 'message error';
                return;
            }

            if (username && password) {
                let users = localStorage.getItem('users');
                users = users ? JSON.parse(users) : [];
                users.push({ username, password });
                localStorage.setItem('users', JSON.stringify(users));
                signupMessage.textContent = 'Sign up successful!';
                signupMessage.className = 'message success';
                signupForm.reset();
            } else {
                signupMessage.textContent = 'Please enter both username and password.';
                signupMessage.className = 'message error';
            }
        });

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            let users = localStorage.getItem('users');
            users = users ? JSON.parse(users) : [];
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                loginMessage.textContent = 'Login successful! Redirecting...';
                loginMessage.className = 'message success';
                setTimeout(() => {
                    window.location.href = 'new.html';
                }, 1500);
            } else {
                loginMessage.textContent = 'Invalid username or password.';
                loginMessage.className = 'message error';
            }
        });
    </script>
</body>
</html>
