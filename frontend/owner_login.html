<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 350px;
    }
    input, button {
      display: block;
      width: 100%;
      margin-top: 1em;
      padding: 0.7em;
      font-size: 1em;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .error {
      color: red;
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Hostel Owner Login</h2>
    <input type="text" id="username" placeholder="Hostel Name">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="window.location.href='change_password.html'">Change Password</button>
    <div id="error" class="error"></div>
  </div>
  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
  
      fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json().then(data => ({ status: res.status, body: data })))
      .then(({ status, body }) => {
        if (status === 200 && body.role === "owner") {
          sessionStorage.setItem("hostelName", username);


          window.location.href = "dashboard_owner.html";
        } else {
          document.getElementById("error").textContent = body.message || "Login failed.";
        }
      })
      .catch(err => {
        document.getElementById("error").textContent = "Error connecting to server.";
      });
    }
  </script>
  
</body>
</html>
