<!DOCTYPE html>
<html>
<head>
    <title>Hostel Request</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in-out;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #2b2d42;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 i {
            color: #4a4e69;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #2b2d42;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 16px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a4e69;
            box-shadow: 0 0 0 2px rgba(74, 78, 105, 0.2);
            background: rgba(255, 255, 255, 1);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a4e69;
        }

        .input-icon input, .input-icon select {
            padding-left: 45px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            transition: all 0.3s ease;
            flex: 1;
        }

        .radio-option:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #4a4e69;
        }

        .radio-option.selected {
            background: #4a4e69;
            border-color: #4a4e69;
            color: white;
        }

        .radio-option.selected i {
            color: white;
        }

        .radio-option i {
            color: #4a4e69;
            font-size: 18px;
        }

        input[type="radio"] {
            display: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #2b2d42, #4a4e69);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #4a4e69, #2b2d42);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 8px;
            margin-top: 20px;
            color: #28a745;
        }

        .success-message i {
            font-size: 24px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
                margin: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-envelope"></i> Send Request to Hostel Owner</h1>
        <form id="requestForm">
            <div class="form-group input-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="studentName" placeholder="Your Name" required>
            </div>

            <div class="form-group input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="studentEmail" placeholder="Your Gmail Address" required pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" title="Only Gmail addresses are allowed.">
            </div>

            <div class="form-group input-icon">
                <i class="fas fa-phone"></i>
                <input type="tel" id="studentPhone" placeholder="Your Phone Number" required pattern="\d{10}$" title="Enter a valid 10-digit Indian mobile number.">
            </div>

            <div class="form-group">
                <label>Room Type</label>
                <div class="radio-group">
                    <label class="radio-option" onclick="selectRoomType('single')">
                        <input type="radio" id="singleRoom" name="roomType" value="single">
                        <i class="fas fa-bed"></i>
                        Single Room
                    </label>
                    <label class="radio-option" onclick="selectRoomType('double')">
                        <input type="radio" id="doubleRoom" name="roomType" value="double">
                        <i class="fas fa-bed"></i>
                        Double Room
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Duration of Stay</label>
                <select id="duration" required>
                    <option value="">Select Duration</option>
                    <option value="3">3 Months</option>
                    <option value="6">6 Months</option>
                    <option value="12">12 Months</option>
                </select>
            </div>

            <div class="form-group">
                <label>Additional Requirements</label>
                <textarea id="requirements" rows="4" placeholder="Any specific requirements or questions... (optional)"></textarea>
            </div>

            <button type="submit">
                <i class="fas fa-paper-plane"></i> Send Request
            </button>
        </form>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <h3>Request Sent Successfully!</h3>
            <p>Your request has been sent to the hostel owner. They will contact you soon.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const hostelName = urlParams.get('name');
            if (!hostelName) {
                alert("Hostel name is missing from the URL.");
                return;
            }

            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'hidden';
            hiddenInput.id = 'hostelName';
            hiddenInput.value = hostelName;
            document.getElementById('requestForm').appendChild(hiddenInput);

            window.selectRoomType = function (type) {
                // Remove 'selected' class from all options
                document.querySelectorAll('.radio-option').forEach(option => {
                    option.classList.remove('selected');
                });

                // Add 'selected' class to the clicked option
                const selectedOption = document.querySelector(`label[onclick="selectRoomType('${type}')"]`);
                if (selectedOption) {
                    selectedOption.classList.add('selected');
                }

                // Set the corresponding radio input to checked
                const radioInput = document.querySelector(`input[value="${type}"]`);
                if (radioInput) {
                    radioInput.checked = true;
                }
            };

            document.getElementById('requestForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.getElementById('studentEmail').value;
                const phone = document.getElementById('studentPhone').value;

                const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
                const phonePattern = /\d{10}$/;

                if (!gmailPattern.test(email)) {
                    alert('Please enter a valid Gmail address.');
                    return;
                }

                if (!phonePattern.test(phone)) {
                    alert('Please enter a valid 10-digit Indian phone number.');
                    return;
                }

                const formData = {
                    studentName: document.getElementById('studentName').value,
                    studentEmail: email,
                    studentPhone: phone,
                    roomType: document.querySelector('input[name="roomType"]:checked')?.value || '',
                    duration: document.getElementById('duration').value,
                    requirements: document.getElementById('requirements').value,
                    hostelName: hostelName
                };

                try {
                    const response = await fetch('http://127.0.0.1:5001/send_request', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });

                    const data = await response.json();
                    if (data.success) {
                        document.getElementById('requestForm').style.display = 'none';
                        document.getElementById('successMessage').style.display = 'block';
                    } else {
                        alert(data.message || 'Failed to send request. Please try again.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('An error occurred. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
