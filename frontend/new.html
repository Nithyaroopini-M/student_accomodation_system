<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column; /* Stack items vertically by default */
            gap: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header h1 {
            margin: 0;
            color: #2b2d42;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .header h1 i {
            color: #4a4e69;
        }

        .search-container {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 10px; /* Reduced margin below search */
        }

        .search-container input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: #4a4e69;
            box-shadow: 0 0 0 2px rgba(74, 78, 105, 0.2);
        }

        .search-container button {
            padding: 12px 20px;
            background: #4a4e69;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container button:hover {
            background: #2b2d42;
            transform: translateY(-2px);
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; /* Increased gap for better spacing */
            align-items: center;
            justify-content: flex-start; /* Align items to the start */
            width: 100%;
            margin-bottom: 15px;
        }

        .filter-container label {
            color: #2b2d42;
            font-weight: bold;
            font-size: 16px;
            margin-right: 5px;
            flex-shrink: 0; /* Prevent label from shrinking */
        }

        .filter-container select,
        .filter-container input[type="number"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            color: #4a4e69;
            cursor: pointer;
            min-width: 100px; /* Ensure inputs/selects have a minimum width */
            margin-right: 10px;
        }

        /* Hide the up and down arrows for number inputs */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        

        .sort-button {
            padding: 8px 12px;
            background: #f0ad4e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            white-space: nowrap; /* Prevent text wrapping in buttons */
        }

        .sort-button:hover {
            background-color: #d9534f;
            transform: translateY(-2px);
        }

        .distance-sort-button {
            padding: 8px 12px;
            background: #5cb85c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .distance-sort-button:hover {
            background-color: #4cae4c;
            transform: translateY(-2px);
        }

        .amenities-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; /* Consistent gap between checkboxes */
            align-items: center;
            justify-content: flex-start; /* Align to start for better flow */
            width: 100%;
        }

        .amenities-filter label {
            color: #2b2d42;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px; /* Space between checkbox and text */
        }

        .suggestion-dropdown {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            width: calc(100% - 20px); /* Match input width */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 10;
            display: none;
            top: 50px; /* Position below the input */
            left: 0; /* Align with input */
        }

        .suggestion-dropdown div {
            padding: 10px;
            cursor: pointer;
            color: #2b2d42;
        }

        .suggestion-dropdown div:hover {
            background-color: #f0f0f0;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .search-container {
                width: 100%;
                max-width: none;
                margin: 0;
            }

            .filter-container {
                flex-direction: column; /* Stack items vertically */
                align-items: flex-start;
                gap: 10px;
            }

            .filter-container label,
            .filter-container select,
            .filter-container input[type="number"],
            .sort-button,
            .distance-sort-button {
                margin-right: 0; /* Remove right margin on smaller screens */
                margin-bottom: 10px; /* Add bottom margin for spacing */
                width: 100%; /* Make elements take full width */
                max-width: 300px; /* Limit max width for better appearance */
            }

            .amenities-filter {
                flex-direction: row; /* Keep checkboxes in a row, but wrap */
                gap: 10px;
                justify-content: flex-start;
            }

            .amenities-filter label {
                margin-right: 15px;
                margin-bottom: 5px;
            }

            .distance-sort-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .suggestion-dropdown {
                width: calc(100% - 20px); /* Adjust width for mobile */
                left: 0;
                top: 50px;
            }
        }

        .hostel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .hostel-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .hostel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .hostel-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .hostel-info {
            padding: 20px;
        }

        .hostel-info h2 {
            margin: 0 0 10px 0;
            color: #2b2d42;
            font-size: 20px;
        }

        .hostel-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hostel-info i {
            color: #4a4e69;
            width: 16px;
        }

        .price {
            color: #4a4e69;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        .view-details {
            display: inline-block;
            padding: 8px 16px;
            background: #4a4e69;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .view-details:hover {
            background: #2b2d42;
            transform: translateY(-2px);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .no-results i {
            font-size: 48px;
            color: #4a4e69;
            margin-bottom: 20px;
        }

        .no-results h2 {
            color: #2b2d42;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #666;
            margin-bottom: 20px;
        }

        .distance-sort-container {
            position: relative; /* Added for positioning the dropdown */
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .distance-sort-container input[type="text"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            flex: 1;
        }
        .distance-sort-container button {
            padding: 10px 12px; /* Minimal padding for better appearance */
            background: #5cb85c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            white-space: nowrap; /* Keeps text on a single line */
            width: auto; /* Ensures the button size fits its content */
            display: inline-block; /* Allows self-adjusting width */
        }


        .distance-sort-container button:hover {
            background-color: #4cae4c;
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-home"></i> Find Your Perfect Hostel</h1>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by location or hostel name..." oninput="displayHostels()">
                <button onclick="searchHostels()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <button class="distance-sort-button" onclick="toggleDistanceSort()">Find hostels near to your University!</button>
            <div id="distanceSortOptions" class="filter-container distance-sort-container" style="display: none;">
                <input type="text" id="collegeSearchInput" placeholder="Enter College Name" oninput="showSuggestions()" onkeydown="handleKeyDown(event)">
                <div id="suggestionDropdown" class="suggestion-dropdown"></div>
            </div>
        </div>

        <div class="header">
            <div class="filter-container">
                <label for="genderFilter">Gender:</label>
                <select id="genderFilter" onchange="displayHostels()">
                    <option value="">All</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                </select>
            </div>

            <div class="filter-container">
                <label for="minPrice">Min Price:</label>
                <input type="number" id="minPrice" placeholder="Min" oninput="displayHostels()">
                <label for="maxPrice">Max Price:</label>
                <input type="number" id="maxPrice" placeholder="Max" oninput="displayHostels()">
                <button class="sort-button" onclick="sortByPrice()">Sort by Price</button>
            </div>

            <div class="filter-container amenities-filter">
                <label>Amenities:</label>
                <label><input type="checkbox" id="wifiFilter" onchange="displayHostels()"> Wifi</label>
                <label><input type="checkbox" id="furnishedFilter" onchange="displayHostels()"> Furnished</label>
                <label><input type="checkbox" id="parkingFilter" onchange="displayHostels()"> Parking</label>
                <label><input type="checkbox" id="fridgeFilter" onchange="displayHostels()"> Fridge</label>
                <label><input type="checkbox" id="washingMachineFilter" onchange="displayHostostels()"> Washing Machine</label>
                <label><input type="checkbox" id="acFilter" onchange="displayHostels()" value="AC"> AC</label>
            </div>
        </div>

        <div id="hostelList" class="hostel-grid">
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            <i class="fasfa-search"></i>
            <h2>No Hostels Found</h2>
            <p>Try adjusting your search criteria or check back later for new listings.</p>
        </div>

    </div>

    <script>
        let allHostels = [];
        let isPriceSorted = false;
        let originalHostelOrder = [];
        let collegeDetails = {};
        let isDistanceSortVisible = false;

        async function fetchCollegeDetails() {
            try {
                const response = await fetch('college_details.json');
                collegeDetails = await response.json();
            } catch (error) {
                console.error('Error fetching college details:', error);
            }
        }

        function toggleDistanceSort() {
            isDistanceSortVisible = !isDistanceSortVisible;
            const distanceSortOptions = document.getElementById('distanceSortOptions');
            distanceSortOptions.style.display = isDistanceSortVisible ? 'flex' : 'none';
            if (isDistanceSortVisible) {
                document.getElementById('collegeSearchInput').focus();
            } else {
                document.getElementById('suggestionDropdown').style.display = 'none';
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the Earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c; // Distance in km
            return distance;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function showSuggestions() {
            const input = document.getElementById('collegeSearchInput').value.trim().toLowerCase();
            const dropdown = document.getElementById('suggestionDropdown');
            dropdown.innerHTML = '';

            if (input.length === 0) {
                dropdown.style.display = 'none';
                return;
            }

            const suggestions = Object.keys(collegeDetails).filter(college =>
                college.toLowerCase().includes(input)
            );

            if (suggestions.length > 0) {
                suggestions.forEach(suggestion => {
                    const div = document.createElement('div');
                    div.textContent = suggestion;
                    div.onclick = () => {
                        document.getElementById('collegeSearchInput').value = suggestion;
                        dropdown.style.display = 'none';
                        sortByDistance();
                    };
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }

        function handleKeyDown(event) {
            const dropdown = document.getElementById('suggestionDropdown');
            if (event.key === 'Escape') {
                dropdown.style.display = 'none';
            }
        }

        function closeSuggestions(event) {
            const dropdown = document.getElementById('suggestionDropdown');
            const input = document.getElementById('collegeSearchInput');
            if (!dropdown.contains(event.target) && event.target !== input) {
                dropdown.style.display = 'none';
            }
        }

        async function sortByDistance() {
            const collegeNameInput = document.getElementById('collegeSearchInput').value.trim().toLowerCase();
            let collegeCoordinates = null;
            let matchedCollegeName = null;

            console.log("College Input:", collegeNameInput);

            for (const collegeName in collegeDetails) {
                if (collegeName.toLowerCase().trim() === collegeNameInput) {
                    matchedCollegeName = collegeName;
                    collegeCoordinates = collegeDetails[collegeName];
                    break;
                }
            }

            console.log("Matched College:", matchedCollegeName);
            console.log("College Coordinates Found:", collegeCoordinates);

            if (!collegeCoordinates) {
                alert('College name not found. Please select a valid college name from suggestions.');
                return;
            }

            const collegeLat = collegeCoordinates[0];
            const collegeLon = collegeCoordinates[1];

            const filteredHostels = allHostels.filter(hostel => {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
                const genderFilter = document.getElementById('genderFilter').value;
                const wifiFilter = document.getElementById('wifiFilter').checked;
                const furnishedFilter = document.getElementById('furnishedFilter').checked;
                const parkingFilter = document.getElementById('parkingFilter').checked;
                const fridgeFilter = document.getElementById('fridgeFilter').checked;
                const washingMachineFilter = document.getElementById('washingMachineFilter').checked;
                const acFilter = document.getElementById('acFilter').checked;

                const name = (hostel.Name || '').toLowerCase();
                const address = (hostel.address || '').toLowerCase();
                const genderMatch = !genderFilter || (hostel.Gender && hostel.Gender.toLowerCase() === genderFilter.toLowerCase());
                const wifiMatch = !wifiFilter || hostel.wifi === true;
                const furnishedMatch = !furnishedFilter || hostel.furnished === true;
                const parkingMatch = !parkingFilter || hostel.Parking === true;
                const fridgeMatch = !fridgeFilter || hostel.fridge === true;
                const washingMachineMatch = !washingMachineFilter || hostel.washing_machine === true;
                const acMatch = !acFilter || hostel.AC_NON_AC === 'AC';
                const searchMatch = name.includes(searchTerm) || address.includes(searchTerm);

                return genderMatch && wifiMatch && furnishedMatch && parkingMatch && fridgeMatch && washingMachineMatch && acMatch && searchMatch &&
                       typeof hostel.latitude === 'number' && typeof hostel.longitude === 'number';
            });

            const hostelsWithDistance = filteredHostels.map(hostel => ({
                ...hostel,
                distance: calculateDistance(hostel.latitude, hostel.longitude, collegeLat, collegeLon)
            }));

            hostelsWithDistance.sort((a, b) => a.distance - b.distance);

            renderHostels(hostelsWithDistance);
            document.getElementById('suggestionDropdown').style.display = 'none';
        }

        async function fetchHostels() {
            try {
                const response = await fetch('http://127.0.0.1:5001/api/hostels');
                allHostels = await response.json();
                originalHostelOrder = [...allHostels];
                displayHostels();
                await fetchCollegeDetails();
            } catch (error) {
                console.error('Error fetching hostels:', error);
            }
        }

        function displayHostels() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const genderFilter = document.getElementById('genderFilter').value;
            const wifiFilter = document.getElementById('wifiFilter').checked;
            const furnishedFilter = document.getElementById('furnishedFilter').checked;
            const parkingFilter = document.getElementById('parkingFilter').checked;
            const fridgeFilter = document.getElementById('fridgeFilter').checked;
            const washingMachineFilter = document.getElementById('washingMachineFilter').checked;
            const acFilter = document.getElementById('acFilter').checked;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;

            const hostelList = document.getElementById('hostelList');
            const noResults = document.getElementById('noResults');
            hostelList.innerHTML = '';

            const filteredHostels = allHostels.filter(hostel => {
                const name = (hostel.Name || '').toLowerCase();
                const address = (hostel.address || '').toLowerCase();
                const genderMatch = !genderFilter || (hostel.Gender && hostel.Gender.toLowerCase() === genderFilter.toLowerCase());
                const wifiMatch = !wifiFilter || hostel.wifi === true;
                const furnishedMatch = !furnishedFilter || hostel.furnished === true;
                const parkingMatch = !parkingFilter || hostel.Parking === true;
                const fridgeMatch = !fridgeFilter || hostel.fridge === true;
                const washingMachineMatch = !washingMachineFilter || hostel.washing_machine === true;
                const acMatch = !acFilter || hostel.AC_NON_AC === 'AC';
                const searchMatch = name.includes(searchTerm) || address.includes(searchTerm);

                // Price range filtering
                const price = parseFloat(hostel.price);
                const minPriceMatch = !minPrice || (price >= parseFloat(minPrice));
                const maxPriceMatch = !maxPrice || (price <= parseFloat(maxPrice));

                return genderMatch && wifiMatch && furnishedMatch && parkingMatch && fridgeMatch && washingMachineMatch && acMatch && searchMatch && minPriceMatch && maxPriceMatch;
            });

            if (filteredHostels.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            renderHostels(filteredHostels);
        }

        function renderHostels(hostels) {
            const hostelList = document.getElementById('hostelList');
            hostelList.innerHTML = '';

            hostels.forEach(hostel => {
                const card = document.createElement('div');
                card.className = 'hostel-card';

                const hash = [...hostel.Name].reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const imgNumber = (hash % 50) + 1;

                const name = hostel.Name || 'Unnamed Hostel';
                const address = hostel.address || 'No address provided';
                const price = hostel.price ? `₹${hostel.price}/month` : 'Price not listed';
                const bedrooms = hostel.bedrooms || 'N/A';
                const ac = hostel.AC_NON_AC || 'N/A';
                const wifi = hostel.wifi ? 'Yes' : 'No';
                const furnished = hostel.furnished ? 'Yes' : 'No';
                const parking = hostel.Parking ? 'Yes' : 'No';
                const fridge = hostel.fridge ? 'Yes' : 'No';
                const washingMachine = hostel.washing_machine ? 'Yes' : 'No';
                const distanceText = hostel.distance ? ` | Distance: ${hostel.distance.toFixed(2)} km` : '';

                card.innerHTML = `
                    <img src="/images/img${imgNumber}.png" alt="${name}" class="hostel-image">
                    <div class="hostel-info">
                        <h2>${name}</h2>
                        <p><i class="fas fa-map-marker-alt"></i> ${address}${distanceText}</p>
                        <p><i class="fas fa-bed"></i> Bedrooms: ${bedrooms} | ${ac}</p>
                        <p><i class="fas fa-wifi"></i> Wifi: ${wifi} | Furnished: ${furnished}</p>
                        <p><i class="fas fa-car"></i> Parking: ${parking} | Fridge: ${fridge}</p>
                        <p><i class="fas fa-tshirt"></i> Washing Machine: ${washingMachine}</p>
                        <div class="price">${price}</div>
                        <a href="hostel_details.html?name=${encodeURIComponent(name)}" class="view-details">
                            <i class="fas fa-info-circle"></i> View Details
                        </a>
                    </div>
                `;

                hostelList.appendChild(card);
            });
        }

        function searchHostels() {
            displayHostels();
        }

        function sortByPrice() {
            isPriceSorted = !isPriceSorted;

            const filteredHostels = allHostels.filter(hostel => {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
                const genderFilter = document.getElementById('genderFilter').value;
                const wifiFilter = document.getElementById('wifiFilter').checked;
                const furnishedFilter = document.getElementById('furnishedFilter').checked;
                const parkingFilter = document.getElementById('parkingFilter').checked;
                const fridgeFilter = document.getElementById('fridgeFilter').checked;
                const washingMachineFilter = document.getElementById('washingMachineFilter').checked;
                const acFilter = document.getElementById('acFilter').checked;

                const name = (hostel.Name || '').toLowerCase();
                const address = (hostel.address || '').toLowerCase();
                const genderMatch = !genderFilter || (hostel.Gender && hostel.Gender.toLowerCase() === genderFilter.toLowerCase());
                const wifiMatch = !wifiFilter || hostel.wifi === true;
                const furnishedMatch = !furnishedFilter || hostel.furnished === true;
                const parkingMatch = !parkingFilter || hostel.Parking === true;
                const fridgeMatch = !fridgeFilter || hostel.fridge === true;
                const washingMachineMatch = !washingMachineFilter || hostel.washing_machine === true;
                const acMatch = !acFilter || hostel.AC_NON_AC === 'AC';
                const searchMatch = name.includes(searchTerm) || address.includes(searchTerm);

                return genderMatch && wifiMatch && furnishedMatch && parkingMatch && fridgeMatch && washingMachineMatch && acMatch && searchMatch;
            });

            let hostelsToSort = [...filteredHostels];

            if (isPriceSorted) {
                hostelsToSort.sort((a, b) => {
                    const priceA = parseFloat(a.price);
                    const priceB = parseFloat(b.price);
                    if (isNaN(priceA) && isNaN(priceB)) return 0;
                    if (isNaN(priceA)) return 1;
                    if (isNaN(priceB)) return -1;
                    return priceA - priceB;
                });
            } else {
                const currentFilteredNames = filteredHostels.map(hostel => hostel.Name);
                hostelsToSort = originalHostelOrder.filter(hostel => currentFilteredNames.includes(hostel.Name));
            }

            renderHostels(hostelsToSort);
        }

        document.getElementById('searchInput').addEventListener('input', displayHostels);
        document.addEventListener('click', closeSuggestions);

        fetchHostels();
    </script>
</body>
</html>
